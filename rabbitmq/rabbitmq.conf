# Server-side heartbeat, in seconds. Default is 60.
#
# Raised because CodeGraph.indexAll() on a large repo (5000+ files) blocks the
# orchestrator's event loop for ~6 minutes of synchronous work, and amqplib
# cannot send a heartbeat while blocked. AMQP negotiates the LOWER of the client
# and server values, so this must match the client's RABBITMQ_HEARTBEAT_SECONDS
# or the short side wins and a long index still drops the connection mid-run.
heartbeat = 900
